<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR optimize test</title>
</head>
<body>
    <a-scene
  mindar-image="imageTargetSrc: ./targets.mind; maxTrack:1;
   filterMinCF:0.05; filterBeta: 0.05;missTolerance:5;"
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <a-asset-item id="myModel" src="https://pub-f776e732125a4907a8bdd8fbed38ac06.r2.dev/car-v2.glb" crossorigin="anonymous"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-gltf-model
      src="#myModel"
      position="0 0 0"
      scale="0.5 0.5 0.5"
      rotation="90 0 0">
    </a-gltf-model>
  </a-entity>

</a-scene>
    
    
</body>
</html>
